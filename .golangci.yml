# golangci-lint v2 configuration for the flowmap engine module.
# The fixture lives in its own module under testdata/ and is linted separately.
version: "2"

linters:
  # The v2 standard set (errcheck, govet, ineffassign, staticcheck, unused) plus
  # misspell.
  enable:
    - misspell
  exclusions:
    paths:
      - testdata
